<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>PgFX Integrated System</title>
<meta name="theme-color" content="#0a0c10"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="PgFX"/>
<meta name="mobile-web-app-capable" content="yes"/>
<link rel="manifest" href="pgfx-manifest.json"/>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='40' fill='%230a0c10'/><circle cx='96' cy='96' r='28' fill='%23ffb020'/><circle cx='96' cy='96' r='14' fill='%230a0c10'/><text x='96' y='160' font-family='monospace' font-size='22' font-weight='700' fill='%23ffb020' text-anchor='middle'>PgFX</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"/>
<style>
/* ══════════════════════════════════════
   DESIGN SYSTEM — UI PREVIEW (verbatim)
══════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0a0c10;--bg-2:#0f1216;--panel:#13171d;--panel-2:#181d24;
  --line:rgba(255,255,255,.06);--line-2:rgba(255,255,255,.10);
  --txt:#9aa3ad;--txt-2:#6b737d;--wh:#eef2f6;--dim:#2a2f37;
  --a:#ffb020;--a-soft:rgba(255,176,32,.12);--a-line:rgba(255,176,32,.28);--a-glow:rgba(255,176,32,.18);
  --g:#00e5a0;--g-soft:rgba(0,229,160,.10);
  --r:#ff5670;--r-soft:rgba(255,86,112,.10);
  --b:#5aa9ff;
  --font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
  /* Aliases for PgFX logic compatibility */
  --s2:rgba(19,23,29,.72);--s3:rgba(19,23,29,.52);
  --br:rgba(255,255,255,.06);--br2:rgba(255,176,32,.28);
  --red:#ff5670;--green:#00e5a0;--amber:#ffb020;--mut:#5a6270;
}

html,body{background:#06080b;color:var(--txt);font-family:var(--font);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── App wrapper ── */
.app-wrap{display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:20px 0;}

/* ── Phone frame ── */
.phone{
  width:100%;max-width:390px;
  background:linear-gradient(160deg,#1a1f27,#0c0e12);
  border-radius:42px;padding:14px;
  border:1px solid #1f242c;
  box-shadow:0 30px 60px -20px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.02) inset,0 1px 0 rgba(255,255,255,.06) inset;
  position:relative;
}
.phone::before{content:'';position:absolute;top:24px;left:50%;transform:translateX(-50%);width:90px;height:24px;border-radius:14px;background:#06080b;z-index:5;border:1px solid #1a1f27;}
.phone::after{content:'';position:absolute;top:32px;left:calc(50% + 28px);width:8px;height:8px;border-radius:50%;background:#0c0e12;box-shadow:inset 0 0 0 1px #1a1f27,0 0 4px rgba(255,176,32,.2);z-index:6;}

/* ── Screen ── */
.screen{
  background:var(--bg);border-radius:30px;
  height:760px;overflow:hidden;position:relative;
  border:1px solid #14181e;
  display:flex;flex-direction:column;
}
.screen::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,176,32,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,176,32,.018) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}
.screen::after{content:'';position:absolute;top:-30%;left:-30%;width:80%;height:80%;background:radial-gradient(ellipse,rgba(255,176,32,.04),transparent 60%);pointer-events:none;z-index:0;}

/* ── Status bar ── */
.status-bar{position:relative;z-index:2;height:44px;display:flex;align-items:center;justify-content:space-between;padding:14px 24px 0;font-family:var(--mono);font-size:11px;color:var(--wh);flex-shrink:0;}
.status-bar .icons{display:flex;gap:5px;align-items:center}
.status-bar svg{width:13px;height:13px}

/* ── App nav ── */
.app-top{position:relative;z-index:2;padding:8px 20px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);background:rgba(10,12,16,.6);backdrop-filter:blur(12px);flex-shrink:0;}
.app-logo{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:11px;color:var(--wh);letter-spacing:.12em;font-weight:700;text-transform:uppercase}
.logo-mark{width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,rgba(255,176,32,.22),rgba(255,176,32,.04));border:1px solid var(--a-line);display:flex;align-items:center;justify-content:center;position:relative;}
.logo-mark::after{content:'';width:6px;height:6px;border-radius:50%;background:var(--a);box-shadow:0 0 10px var(--a);}
.top-status{display:flex;gap:8px;align-items:center}
.live-pill{font-family:var(--mono);font-size:8px;color:var(--g);letter-spacing:.18em;display:flex;align-items:center;gap:5px;border:1px solid rgba(0,229,160,.25);padding:3px 7px;border-radius:3px;background:var(--g-soft);}
.live-pill::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--g);box-shadow:0 0 6px var(--g);animation:p 1.6s infinite}
@keyframes p{50%{opacity:.3}}

/* ── Tab bar ── */
.tabs{position:relative;z-index:2;display:flex;gap:3px;padding:7px 12px;overflow-x:auto;border-bottom:1px solid var(--line);background:var(--bg-2);scrollbar-width:none;flex-shrink:0;}
.tabs::-webkit-scrollbar{display:none}
.tab{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:5px 10px;border-radius:4px;background:transparent;border:1px solid transparent;color:var(--txt-2);white-space:nowrap;cursor:pointer;transition:all .15s;}
.tab.on{background:var(--a-soft);color:var(--a);border-color:var(--a-line);box-shadow:inset 0 0 12px rgba(255,176,32,.08)}

/* ── Body scroll ── */
.body{position:relative;z-index:1;flex:1;overflow-y:auto;padding:14px 14px 70px;scrollbar-width:none;}
.body::-webkit-scrollbar{display:none}

/* ── Bottom nav ── */
.bottom-bar{position:absolute;bottom:0;left:0;right:0;height:52px;background:rgba(8,10,14,.94);backdrop-filter:blur(16px);border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-around;padding:0 10px;z-index:5;border-radius:0 0 30px 30px;}
.bb-i{display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--txt-2);cursor:pointer;padding:4px 10px;border-radius:8px;transition:color .15s;}
.bb-i.on{color:var(--a)}
.bb-i svg{width:18px;height:18px}
.bb-i span{font-family:var(--mono);font-size:7px;letter-spacing:.1em;text-transform:uppercase}

/* ── Cards ── */
.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:13px;margin-bottom:10px;}
.card.glow{border-color:var(--a-line);box-shadow:0 0 20px rgba(255,176,32,.04)}
.card-glow{border-color:var(--a-line)!important;box-shadow:0 0 20px rgba(255,176,32,.04)!important}
.card-title,.section-title{font-family:var(--mono);font-size:9px;color:var(--a);letter-spacing:.16em;text-transform:uppercase;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.section-h{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px;}
.section-h h2,.pg-title{font-size:17px;font-weight:700;color:var(--wh);letter-spacing:-.01em}
.section-h p,.section-sub{font-size:11px;color:var(--txt-2);margin-bottom:10px;line-height:1.6}

/* ── Hero ── */
.hero{border-radius:13px;padding:22px 17px 20px;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(255,176,32,.10),transparent 70%),linear-gradient(180deg,#10141a,#0a0c10);border:1px solid var(--a-line);position:relative;overflow:hidden;margin-bottom:12px;}
.hero::before{content:'';position:absolute;bottom:0;left:0;right:0;height:50px;background-image:repeating-linear-gradient(90deg,var(--a) 0 2px,transparent 2px 14px);opacity:.06;}
.sys-badge{font-family:var(--mono);font-size:8px;color:var(--a);letter-spacing:.2em;text-transform:uppercase;background:var(--a-soft);border:1px solid var(--a-line);padding:3px 8px;border-radius:3px;display:inline-block;margin-bottom:12px}
.hero h1{font-size:52px;font-weight:800;color:var(--wh);letter-spacing:-.04em;line-height:.92}
.hero h1 em{font-style:normal;color:var(--a)}
.hero .v{font-family:var(--mono);font-size:9px;color:var(--a);letter-spacing:.16em;border:1px solid var(--a-line);padding:3px 8px;border-radius:3px;display:inline-block;margin-top:8px;background:var(--a-soft)}
.hero-row{display:flex;gap:14px;margin-top:16px;padding-top:12px;border-top:1px solid var(--line)}
.hero-stat{flex:1}
.hero-stat .l{font-family:var(--mono);font-size:7px;color:var(--txt-2);letter-spacing:.16em;text-transform:uppercase;margin-bottom:3px}
.hero-stat .v{font-family:var(--mono);font-size:13px;color:var(--wh);font-weight:600}
.hero-stat .v.amber{color:var(--a)}.hero-stat .v.green{color:var(--g)}.hero-stat .v.red{color:var(--r)}

/* ── Stats strip ── */
.strip{display:grid;grid-template-columns:repeat(4,1fr);gap:0;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 4px;margin-bottom:10px;}
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:0;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 4px;margin-bottom:10px;}
.strip-i,.si{display:flex;flex-direction:column;align-items:center;gap:3px;border-right:1px solid var(--line);padding:2px}
.strip-i:last-child,.si:last-child{border-right:none}
.ssep{display:none}
.strip-l,.sl{font-family:var(--mono);font-size:7px;color:var(--txt-2);letter-spacing:.12em;text-transform:uppercase}
.strip-v,.sv{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--wh)}
.strip-v.amber,.sv.ac{color:var(--a)}.strip-v.green,.sv.g{color:var(--g)}.strip-v.red,.sv.r{color:var(--r)}

/* ── Modules ── */
.modules{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.mod{border-radius:10px;padding:13px;border:1px solid var(--line);background:var(--panel);min-height:110px;display:flex;flex-direction:column;position:relative;overflow:hidden;cursor:pointer;}
.mod.tracker{border-color:var(--a-line);background:linear-gradient(160deg,var(--panel),#0e1218)}
.mod.glass{background:var(--panel);}
.mod-num{font-family:var(--mono);font-size:8px;color:var(--dim);letter-spacing:.14em;margin-bottom:7px}
.mod.tracker .mod-num{color:var(--a)}
.mod-icon{color:var(--txt-2);margin-bottom:7px}
.mod.tracker .mod-icon{color:var(--a)}
.mod-icon svg{width:17px;height:17px}
.mod-title{font-size:11px;font-weight:700;color:var(--wh);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.mod-sub,.mod-open{font-family:var(--mono);font-size:8px;color:var(--txt-2);letter-spacing:.08em;text-transform:uppercase}
.mod-arrow{margin-top:auto;padding-top:7px;font-family:var(--mono);font-size:8px;color:var(--a);letter-spacing:.14em;text-transform:uppercase}
.trow{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04);font-family:var(--mono);font-size:9px}
.trow:last-child{border:none}
.trow .l{color:var(--txt-2);letter-spacing:.08em}
.trow .v{color:var(--wh)}.trow .v.amber{color:var(--a)}.trow .v.green{color:var(--g)}.trow .v.red{color:var(--r)}

/* ── Metric cards ── */
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.metric,.kpi-block{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px;transition:border-color .2s;}
.metric.glass{background:var(--panel)}
.metric .l,.kpi-label,.metric-lbl{font-family:var(--mono);font-size:8px;color:var(--txt-2);letter-spacing:.16em;text-transform:uppercase;margin-bottom:8px;display:block}
.metric .v,.kpi-value,.metric-val{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--wh);line-height:1}
.metric .v.amber,.kpi-value.ac,.metric-val.ac,.metric-val.amber{color:var(--a)}
.metric .v.green,.kpi-value.g,.metric-val.g{color:var(--g)}
.metric .v.red,.kpi-value.r,.metric-val.r{color:var(--r)}
.kpi-value.am,.metric-val.am{color:var(--a)}
.metric .s,.kpi-sub,.metric-sub{font-family:var(--mono);font-size:9px;color:var(--txt-2);margin-top:5px}
.kpi-sub.ac{color:var(--a)}
/* KPI hero */
.kpi-hero{background:linear-gradient(160deg,var(--panel) 0%,#0c1015 100%);border:1px solid var(--a-line);border-radius:13px;padding:16px;margin-bottom:10px;position:relative;overflow:hidden;}
.kpi-hero::after{content:'';position:absolute;top:-30%;right:-20%;width:60%;height:160%;background:radial-gradient(circle,var(--a-glow),transparent 60%);pointer-events:none;}
.kpi-l{font-family:var(--mono);font-size:9px;color:var(--a);letter-spacing:.16em;text-transform:uppercase}
.kpi-v{font-family:var(--mono);font-size:32px;color:var(--wh);font-weight:800;line-height:1;margin-top:6px}

/* ── Equity curve ── */
.equity-wrap{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:13px;margin-bottom:10px;position:relative;}
.equity-svg{width:100%;height:68px}
.equity-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.equity-val{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--wh)}

/* ── Step wizard ── */
.steps{display:flex;align-items:center;gap:4px;overflow-x:auto;padding-bottom:5px;margin-bottom:10px;scrollbar-width:none}
.steps::-webkit-scrollbar{display:none}
.step-dot{width:21px;height:21px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;font-weight:700;flex-shrink:0}
.step-dot.done{background:var(--a-soft);color:var(--a);border:1px solid var(--a-line)}
.step-dot.active{background:var(--a);color:#0a0c10;box-shadow:0 0 12px var(--a-glow)}
.step-dot.idle{background:var(--bg-2);color:var(--txt-2);border:1px solid var(--line)}
.step-lbl{font-family:var(--mono);font-size:8px;color:var(--txt-2);white-space:nowrap}
.step-lbl.active{color:var(--a)}
.step-arr,.step-arrow{color:var(--dim);font-size:9px}

/* ── Checklist ── */
.chk-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;user-select:none;}
.chk-row:last-child{border:none}
.chk-box{width:16px;height:16px;border-radius:4px;border:1px solid var(--a-line);background:var(--a-soft);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:#0a0c10;font-weight:900;margin-top:2px;}
.chk-box.on{background:var(--a);border-color:var(--a)}
.chk-box.on::before{content:'✓'}
.chk-tick{display:none}
.chk-lbl{font-size:11px;color:var(--txt);line-height:1.5}
.chk-row.on .chk-lbl{color:var(--wh)}

/* ── Buttons ── */
.btn{font-family:var(--mono);font-size:10px;letter-spacing:.08em;font-weight:500;padding:9px 13px;border-radius:6px;border:1px solid var(--line-2);background:transparent;color:var(--txt);cursor:pointer;transition:all .15s;}
.btn:hover{color:var(--wh);border-color:rgba(255,255,255,.15)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-amber,.btn-primary{background:linear-gradient(135deg,var(--a),#cc8c1a);color:#0a0c10;border-color:transparent;font-weight:700;box-shadow:0 0 16px rgba(255,176,32,.18);}
.btn-amber:hover,.btn-primary:hover{background:linear-gradient(135deg,#ffc840,var(--a));box-shadow:0 0 24px rgba(255,176,32,.28);}
.btn-full{width:100%;padding:12px;font-size:10px;letter-spacing:.18em}
.btn-danger{background:var(--r-soft);color:var(--r);border-color:rgba(255,86,112,.25)}
.btn-green{background:var(--g);color:#0a0c10;border-color:transparent;font-weight:700}
.btn-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;justify-content:space-between;align-items:center}
.nav-right{display:flex;gap:6px}

/* ── Badges ── */
.badge{display:inline-block;font-family:var(--mono);font-size:8px;letter-spacing:.08em;padding:2px 6px;border-radius:3px;text-transform:uppercase}
.b-g,.badge-g{background:var(--g-soft);color:var(--g);border:1px solid rgba(0,229,160,.25)}
.b-r,.badge-r{background:var(--r-soft);color:var(--r);border:1px solid rgba(255,86,112,.25)}
.b-a,.badge-a{background:var(--a-soft);color:var(--a);border:1px solid var(--a-line)}
.b-m,.badge-m{background:rgba(255,255,255,.04);color:var(--txt-2);border:1px solid var(--line)}

/* ── Inputs ── */
.inp,.sel,input,select,textarea{width:100%;background:var(--bg-2);border:1px solid var(--line);border-radius:7px;color:var(--wh);font-family:var(--font);font-size:12px;padding:9px 11px;-webkit-appearance:none;outline:none;transition:border-color .2s;}
.inp:focus,.sel:focus,input:focus,select:focus,textarea:focus{border-color:var(--a-line);background:rgba(255,176,32,.03)}
input:disabled{color:var(--mut);opacity:.5;cursor:not-allowed}
select option{background:var(--bg)}
textarea{resize:vertical;min-height:58px}
.flbl,.field-label{font-family:var(--mono);font-size:8px;color:var(--txt-2);letter-spacing:.14em;text-transform:uppercase;margin-bottom:5px;display:block}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}

/* ── PMF ── */
.pmf,.qual-pmf{display:flex;gap:5px;margin-top:6px}
.pmf-b,.pmf-btn{flex:1;padding:6px 3px;font-family:var(--mono);font-size:9px;font-weight:600;border-radius:4px;border:1px solid var(--line);background:transparent;color:var(--txt-2);cursor:pointer}
.pmf-b.pass,.pmf-btn.pass{background:var(--a-soft);color:var(--a);border-color:var(--a-line)}
.pmf-b.marg,.pmf-btn.marginal{background:rgba(90,169,255,.1);color:var(--b);border-color:rgba(90,169,255,.25)}
.pmf-b.fail,.pmf-btn.fail{background:var(--r-soft);color:var(--r);border-color:rgba(255,86,112,.25)}

/* ── Outcomes ── */
.out-row,.outcome-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.out-b,.outcome-btn{flex:1;min-width:60px;padding:9px 5px;font-family:var(--mono);font-size:10px;border-radius:6px;border:1px solid var(--line);background:transparent;color:var(--txt-2);cursor:pointer}
.out-b.win,.outcome-btn.sel-win{background:var(--a-soft);color:var(--a);border-color:var(--a-line);font-weight:700}
.out-b.loss,.outcome-btn.sel-loss{background:var(--r-soft);color:var(--r);border-color:rgba(255,86,112,.25);font-weight:700}
.out-b.be,.outcome-btn.sel-be{background:rgba(255,255,255,.06);color:var(--wh);border-color:var(--line-2);font-weight:700}
.outcome-btn.sel-open{background:var(--a-soft);color:var(--a);border-color:var(--a-line);font-weight:700}

/* ── Alerts ── */
.alert{border-radius:7px;padding:10px 12px;font-size:11px;line-height:1.5;margin:8px 0}
.alert-i,.alert-a{background:rgba(255,176,32,.04);border:1px solid var(--a-line);color:var(--a)}
.alert-g{background:var(--g-soft);border:1px solid rgba(0,229,160,.2);color:var(--g)}
.alert-r{background:var(--r-soft);border:1px solid rgba(255,86,112,.2);color:var(--r)}
.alert-b{background:rgba(90,169,255,.06);border:1px solid rgba(90,169,255,.2);color:var(--b)}
.alert-quote{background:transparent;border-left:2px solid var(--a);padding:4px 12px;color:var(--wh);font-style:italic;font-size:11px;line-height:1.6;margin:8px 0}

/* ── Progress bars ── */
.bar-track{height:4px;border-radius:2px;background:rgba(255,255,255,.06);overflow:hidden;margin-top:5px}
.bar-fill{height:100%;background:var(--a);border-radius:2px;transition:width .4s}
.bar-fill.g{background:var(--g)}.bar-fill.r{background:var(--r)}.bar-fill.a{background:var(--a)}
.progress-row{display:flex;justify-content:space-between;font-size:11px;color:var(--txt-2);margin-bottom:4px}

/* ── Trade items ── */
.trade-item{display:grid;grid-template-columns:auto 1fr auto auto;gap:9px;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);}
.trade-pair{font-family:var(--mono);font-size:11px;color:var(--wh);font-weight:600;letter-spacing:.04em}
.trade-meta{font-family:var(--mono);font-size:9px;color:var(--txt-2);margin-top:2px}
.trade-r{font-family:var(--mono);font-size:12px;font-weight:700}
.trade-r.g{color:var(--g)}.trade-r.r{color:var(--r)}.trade-r.a{color:var(--a)}
.trade-side{width:4px;height:30px;border-radius:2px}
.trade-side.long{background:var(--g)}.trade-side.short{background:var(--r)}.trade-side.flat{background:var(--txt-2)}

/* ── Calendar ── */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:8px}
.cal-d{aspect-ratio:1;border-radius:3px;background:var(--bg-2);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:var(--mono);font-size:8px;color:var(--txt-2);border:1px solid var(--line);gap:1px}
.cal-d.win{background:var(--a-soft);color:var(--a);border-color:var(--a-line)}
.cal-d.loss{background:var(--r-soft);color:var(--r);border-color:rgba(255,86,112,.2)}
.cal-d.be{background:rgba(255,255,255,.05);color:var(--wh);border-color:var(--line-2)}
.cal-d.today{box-shadow:0 0 0 1px var(--a)}
.cal-h{font-family:var(--mono);font-size:7px;color:var(--txt-2);letter-spacing:.08em;text-align:center}
.cal-r{font-size:7px}

/* ── Session tables ── */
.sess-table-wrap{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:10px;}
.sess-table-head{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;border-bottom:1px solid var(--line);background:rgba(255,176,32,.03);}

/* ── Accordion ── */
.accordion,.acc{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:11px 13px;margin-bottom:6px;cursor:pointer;}
.accordion.glass{background:var(--panel)}
.accordion-body,.acc-body{margin-top:8px;font-size:11px;color:var(--txt);line-height:1.6;border-top:1px solid var(--line);padding-top:8px;}
.accordion-item{font-size:11px;color:var(--txt);padding:4px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.acc-h{display:flex;justify-content:space-between;align-items:center}
.acc-t{font-size:11px;color:var(--wh);font-weight:600;letter-spacing:.02em}
.acc-n{font-family:var(--mono);font-size:8px;color:var(--a);letter-spacing:.16em}
.acc.open,.accordion.open{border-color:var(--a-line)}

/* ── Misc ── */
.filter-btn{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:5px 10px;border-radius:4px;background:transparent;border:1px solid transparent;color:var(--txt-2);cursor:pointer;white-space:nowrap}
.filter-btn.active{background:var(--a-soft);color:var(--a);border-color:var(--a-line)}
.filter-bar{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.mini-card{background:var(--panel-2);border:1px solid var(--line);border-radius:7px;padding:11px 12px}
.mini-label{font-family:var(--mono);font-size:8px;text-transform:uppercase;letter-spacing:.14em;color:var(--txt-2);margin-bottom:7px;display:block}
.cta{width:100%;padding:13px;border-radius:10px;background:linear-gradient(135deg,var(--a),#cc8c1a);color:#0a0c10;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px;box-shadow:0 4px 20px rgba(255,176,32,.2);}
.readiness-block{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:13px;margin-bottom:8px;}
.rg-row{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:11px}
.rg-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.rg-dot.g{background:var(--g);box-shadow:0 0 5px var(--g)}
.rg-dot.r{background:var(--r);box-shadow:0 0 5px var(--r)}
.rg-dot.a{background:var(--a);box-shadow:0 0 5px var(--a)}
.rg-lbl{color:var(--txt);flex:1}.rg-val{font-family:var(--mono);font-size:10px;font-weight:600}
.scale-gate-btn{width:100%;padding:9px;border-radius:6px;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;border:1px solid transparent;cursor:default;margin-top:8px}
.scale-gate-btn.locked{background:var(--a-soft);border-color:var(--a-line);color:var(--a)}
.scale-gate-btn.open{background:var(--g-soft);border-color:rgba(0,229,160,.25);color:var(--g)}
.setup-breakdown{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:13px;margin-bottom:8px;}
.sb-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.sb-row:last-child{border:none}
.sb-type{font-family:var(--mono);font-size:9px;color:var(--txt-2);min-width:48px}
.sb-bar-wrap{flex:1;height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.sb-bar{height:100%;background:var(--a);border-radius:2px}
.sb-wr{font-family:var(--mono);font-size:9px;color:var(--wh);min-width:44px;text-align:right}
.monthly-target-block{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:13px;margin-top:8px;}
.equity-wrap{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:13px;margin-bottom:10px;}
table{width:100%;border-collapse:collapse;font-size:11px}
th,td{padding:7px 5px;text-align:left;border-bottom:1px solid var(--line)}
th{font-family:var(--mono);font-size:8px;color:var(--txt-2);letter-spacing:.12em;text-transform:uppercase;font-weight:400}
td{color:var(--wh);font-family:var(--mono);font-size:10px}
td.r{text-align:right}td.amber{color:var(--a)}td.g{color:var(--g)}td.red{color:var(--r)}
/* dash compat */
.dash-layout,.dash-kpi-col,.dash-mid-col,.dash-right-col{display:flex;flex-direction:column;gap:8px}
.kpi-block{margin-bottom:0}
.sess-row{display:flex;align-items:center;gap:7px;padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.03);font-size:11px}
.sess-row:last-child{border:none}

@media(max-width:420px){
  .app-wrap{padding:0;align-items:flex-start}
  .phone{border-radius:0;border:none;box-shadow:none;padding:0;width:100vw;max-width:100%}
  .phone::before,.phone::after{display:none}
  .screen{border-radius:0;height:100dvh}
  .bottom-bar{border-radius:0}
}

<body>

<div class="app-wrap">
  <div class="phone">
    <div class="screen">

      <div class="status-bar">
        <span id="clk">9:41</span>
        <span class="icons">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1.5 8.5a13 13 0 0121 0M5 12a9 9 0 0114 0M8.5 15.5a5 5 0 017 0"/><circle cx="12" cy="19" r="1" fill="currentColor"/></svg>
          <svg viewBox="0 0 24 24" fill="currentColor"><rect x="2" y="7" width="18" height="11" rx="2"/><path d="M22 11v3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </span>
      </div>

      <div class="app-top">
        <div class="app-logo">
          <span class="logo-mark"></span>
          PgFX
        </div>
        <div class="top-status">
          <span class="live-pill">LIVE</span>
        </div>
      </div>

      <div class="tabs" id="sub-tabs" style="display:none"></div>
      <div class="body" id="body-content"></div>

      <div class="bottom-bar">
        <div class="bb-i" id="bb-cover" onclick="goMain('cover')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1z"/><path d="M9 21V12h6v9"/></svg>
          <span>Home</span>
        </div>
        <div class="bb-i" id="bb-session" onclick="goMain('session')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span>Session</span>
        </div>
        <div class="bb-i" id="bb-log" onclick="goMain('log')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 16l4-4 4 4 4-4"/></svg>
          <span>Trades</span>
        </div>
        <div class="bb-i" id="bb-more" onclick="goMain('more')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="5" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/></svg>
          <span>More</span>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
// ── CONFIG ──
let R_VAL=250,ACCT=25000;
const SK='pgfx-v2';
const DEF_SETTINGS={accountSize:25000,riskPct:0.5,tpR:3,beR:1.5,monthlyTargetPct:5,currency:'$',fundTargets:{salaryBuffer:8000,challengeFund:3000,personalAccount:4000},eval:{enabled:true,phase:1,phase1PassedAt:'',profitTargetPct:8,phase2ProfitTargetPct:6,dailyLossLimitPct:4,maxLossLimitPct:8,drawdownType:'static',minTradingDays:3}};
let state={trades:[],weeklyReviews:[],mistakes:[],setups:[],fundProgress:{salaryBuffer:0,challengeFund:0,personalAccount:0},scalingChecks:Array(10).fill(false),ftChecks:Array(10).fill(false),settings:{...DEF_SETTINGS}};
// data persists across sessions

function syncSettings(){const s=state.settings||DEF_SETTINGS;R_VAL=Math.round(s.accountSize*s.riskPct/100);ACCT=s.accountSize;}
const cur=()=>(state.settings&&state.settings.currency)||'$';
const ft=()=>Object.assign({salaryBuffer:8000,challengeFund:3000,personalAccount:4000},(state.settings||{}).fundTargets||{});
const mTarget=()=>Math.round(((state.settings&&state.settings.monthlyTargetPct)||5)/100*ACCT);
function migrateState(){if(!state.settings)state.settings={...DEF_SETTINGS};if(!state.mistakes)state.mistakes=[];if(!state.setups)state.setups=[];if(!state.settings.fundTargets)state.settings.fundTargets={...DEF_SETTINGS.fundTargets};if(!state.settings.monthlyTargetPct)state.settings.monthlyTargetPct=DEF_SETTINGS.monthlyTargetPct;if(!state.settings.eval)state.settings.eval={...DEF_SETTINGS.eval};if(!state.settings.eval.phase)state.settings.eval.phase=1;if(!state.settings.eval.phase2ProfitTargetPct)state.settings.eval.phase2ProfitTargetPct=6;if(state.settings.eval.profitTargetPct===10)state.settings.eval.profitTargetPct=8;if(!state.weeklyReviews)state.weeklyReviews=[];if(!state.decisionGate)state.decisionGate={};if(!state.milestoneChecks)state.milestoneChecks={};}
function saveEval(k,v){if(!state.settings.eval)state.settings.eval={...DEF_SETTINGS.eval};if(k==='drawdownType')state.settings.eval[k]=v;else if(k==='enabled')state.settings.eval[k]=v;else state.settings.eval[k]=parseFloat(v)||0;save();renderContent();}
function passPhase1(){
  if(!confirm('Mark Phase 1 as PASSED? This will switch the profit target to Phase 2 (6%) and cannot be undone.'))return;
  state.settings.eval.phase=2;
  state.settings.eval.phase1PassedAt=new Date().toISOString();
  state.settings.eval.profitTargetPct=state.settings.eval.phase2ProfitTargetPct||6;
  save();renderContent();
}
function resetToPhase1(){
  if(!confirm('Reset back to Phase 1? Use this only if Phase 1 was marked passed by mistake.'))return;
  state.settings.eval.phase=1;
  state.settings.eval.phase1PassedAt='';
  state.settings.eval.profitTargetPct=8;
  save();renderContent();
}
function load(){try{const s=localStorage.getItem(SK);if(s){const d=JSON.parse(s);state={...state,...d};migrateState();}}catch{}syncSettings();}
function save(){try{localStorage.setItem(SK,JSON.stringify(state));}catch{}}
load();

function today(){return new Date().toISOString().split('T')[0];}
function weekStart(){const d=new Date();const diff=d.getDay()===0?-6:1-d.getDay();const m=new Date(d);m.setDate(d.getDate()+diff);m.setHours(0,0,0,0);return m;}
function weeklyR(){return state.trades.filter(t=>new Date(t.date)>=weekStart()&&t.tradeTaken&&t.resultR!=null&&t.outcome!=='open').reduce((s,t)=>s+(t.resultR||0),0);}

// ── NAV ──
let currentTab='cover';
const MORE_TABS=['dashboard','discipline','reviews','scaling','playbook','mistakes','setups','settings','review','milestone'];

function goMain(t){
  if(t==='more'){currentTab=MORE_TABS.includes(currentTab)?currentTab:'dashboard';}
  else{currentTab=t;}
  if(t==='session'&&weeklyR()>-3&&!state.trades.some(e=>e.date===today()))resetSession();
  renderApp();
  try{document.getElementById('body-content').scrollTop=0;}catch(e){}
}

function goTab(t){
  currentTab=t;
  if(t==='session'&&weeklyR()>-3&&!state.trades.some(e=>e.date===today()))resetSession();
  renderApp();
  try{document.getElementById('body-content').scrollTop=0;}catch(e){}
}

function renderContent(){renderApp();}

function renderApp(){
  const isMore=MORE_TABS.includes(currentTab);
  const mainKey=isMore?'more':currentTab;

  // Bottom bar
  ['cover','session','log','more'].forEach(t=>{
    const el=document.getElementById('bb-'+t);
    if(el)el.className='bb-i'+((t===mainKey||( t==='more'&&isMore))?' on':'');
  });

  // Sub-tabs
  const subEl=document.getElementById('sub-tabs');
  if(isMore){
    subEl.style.display='flex';
    subEl.innerHTML=[['dashboard','Dash'],['discipline','Disc.'],['reviews','Reviews'],['scaling','Scale'],['playbook','Play'],['mistakes','Errors'],['setups','Setups'],['review','Sunday'],['milestone','Milestones'],['settings','Config']].map(([id,l])=>`<span class="tab ${currentTab===id?'on':''}" onclick="goTab('${id}')">${l}</span>`).join('');
  }else{
    subEl.style.display='none';
  }

  // Content
  const map={cover:renderCover,session:renderSession,log:renderLog,dashboard:renderDashboard,discipline:renderDiscipline,reviews:renderReviews,scaling:renderScaling,playbook:renderPlaybook,mistakes:renderMistakes,setups:renderSetups,settings:renderSettings,review:renderSundayReview,milestone:renderMilestone};
  document.getElementById('body-content').innerHTML=(map[currentTab]||renderCover)();
}

// ── HELPERS ──
function badge(txt,type){const m={green:'b-g',red:'b-r',amber:'b-a',gray:'b-m',blue:'b-m'};return`<span class="badge ${m[type]||'b-m'}">${txt}</span>`;}
function bar(v,max,type=''){const pct=Math.min(100,Math.max(0,max?(v/max)*100:0));return`<div class="bar-track"><div class="bar-fill ${type}" style="width:${pct}%"></div></div>`;}
function esc(s){return String(s??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;");}

// ── METRICS ──
function metrics(){
  const closed=state.trades.filter(t=>t.tradeTaken&&t.resultR!=null&&t.outcome!=='open');
  const n=closed.length;
  if(!n)return{n:0,wins:0,losses:0,be:0,totalR:0,winRate:0,avgR:0,pnl:0,balance:ACCT,discAvg:0};
  const wins=closed.filter(t=>t.resultR>0).length;
  const losses=closed.filter(t=>t.resultR<0).length;
  const be=closed.filter(t=>t.resultR===0).length;
  const totalR=closed.reduce((s,t)=>s+(t.resultR||0),0);
  const dArr=closed.filter(t=>t.discScore!=null);
  const discAvg=dArr.length?dArr.reduce((s,t)=>s+t.discScore,0)/dArr.length:0;
  const pnl=totalR*R_VAL;
  return{n,wins,losses,be,totalR:+totalR.toFixed(2),winRate:+(wins/n*100).toFixed(1),avgR:+(totalR/n).toFixed(2),pnl:+pnl.toFixed(0),balance:ACCT+pnl,discAvg:+discAvg.toFixed(1)};
}

// ── COVER / HOME ──
function renderCover(){
  const c=cur();
  const closed=state.trades.filter(t=>t.tradeTaken&&t.resultR!=null&&t.outcome!=='open');
  const wins=closed.filter(t=>t.resultR>0);
  const losses=closed.filter(t=>t.resultR<0);
  const totalR=closed.reduce((s,t)=>s+(t.resultR||0),0);
  const wr=closed.length?(wins.length/closed.length*100).toFixed(1)+'%':'—';
  const pnl=Math.round(totalR*R_VAL);
  const pnlStr=closed.length?((pnl>=0?'+':'')+c+Math.abs(pnl).toLocaleString()):'—';
  const avgR=closed.length?(totalR/closed.length).toFixed(2):'—';
  const grossWin=wins.reduce((s,t)=>s+t.resultR,0)*R_VAL;
  const grossLoss=Math.abs(losses.reduce((s,t)=>s+t.resultR,0))*R_VAL;
  const pf=grossLoss>0?(grossWin/grossLoss).toFixed(2):closed.length?'∞':'—';
  const m=metrics();
  const ev=state.settings.eval||DEF_SETTINGS.eval;
  const profitTarget=Math.round(ev.profitTargetPct/100*ACCT);
  const profitPct=Math.min(100,Math.max(0,Math.round(m.pnl/profitTarget*100)));
  const today_str=today();
  const todayT=state.trades.filter(t=>t.date===today_str&&t.tradeTaken&&t.resultR!=null&&t.outcome!=='open');
  const todayPnl=todayT.reduce((s,t)=>s+(t.resultR||0),0)*R_VAL;
  const dailyLimit=-Math.round(ev.dailyLossLimitPct/100*ACCT);
  const dailyBreached=todayPnl<=dailyLimit;

  return`
  <div class="hero">
    <span class="sys-badge">PgFX Integrated System</span>
    <h1>Pg<em>FX</em></h1>
    <span class="v">v2.0 · INTEGRATED</span>
    <div class="hero-row">
      <div class="hero-stat"><div class="l">Win Rate</div><div class="v amber">${wr}</div></div>
      <div class="hero-stat"><div class="l">Total P&amp;L</div><div class="v ${pnl>=0?'green':'red'}">${pnlStr}</div></div>
      <div class="hero-stat"><div class="l">Sessions</div><div class="v">${state.trades.length}</div></div>
    </div>
  </div>

  <div class="strip">
    <div class="strip-i"><span class="strip-l">Trades</span><span class="strip-v">${closed.length||0}</span></div>
    <div class="strip-i"><span class="strip-l">Avg R</span><span class="strip-v ${parseFloat(avgR)>=0?'amber':'red'}">${avgR==='—'?'—':(parseFloat(avgR)>=0?'+':'')+avgR+'R'}</span></div>
    <div class="strip-i"><span class="strip-l">P.Factor</span><span class="strip-v ${parseFloat(pf)>=1||pf==='∞'?'green':'red'}">${pf}</span></div>
    <div class="strip-i"><span class="strip-l">To Proof</span><span class="strip-v">${Math.max(0,30-closed.length)}</span></div>
  </div>

  ${ev.enabled?`
  <div class="card" style="margin-bottom:10px">
    <div class="card-title">Eval — Phase ${ev.phase||1}<span style="color:${m.pnl>=profitTarget?'var(--g)':dailyBreached?'var(--r)':'var(--a)'}">${m.pnl>=profitTarget?'TARGET HIT':dailyBreached?'BREACHED':'PASSING'}</span></div>
    <div style="display:flex;gap:6px;margin-bottom:8px">
      <div style="flex:1;padding:5px 8px;border-radius:5px;background:${(ev.phase||1)===1?'var(--a-soft)':'rgba(0,229,160,.06)'};border:1px solid ${(ev.phase||1)===1?'var(--a-line)':'rgba(0,229,160,.2)'}">
        <div style="font-family:var(--mono);font-size:7px;color:${(ev.phase||1)===1?'var(--a)':'var(--g)'};letter-spacing:.12em">PHASE 1 ${(ev.phase||1)>1?'✓':''}</div>
        <div style="font-size:10px;color:var(--wh)">8% · ${c}${Math.round(0.08*ACCT).toLocaleString()}</div>
      </div>
      <div style="flex:1;padding:5px 8px;border-radius:5px;background:${(ev.phase||1)===2?'var(--g-soft)':'var(--bg-2)'};border:1px solid ${(ev.phase||1)===2?'rgba(0,229,160,.3)':'var(--line)'}">
        <div style="font-family:var(--mono);font-size:7px;color:${(ev.phase||1)===2?'var(--g)':'var(--txt-2)'};letter-spacing:.12em">PHASE 2 ${(ev.phase||1)<2?'🔒':''}</div>
        <div style="font-size:10px;color:${(ev.phase||1)===2?'var(--wh)':'var(--txt-2)'}">6% · ${c}${Math.round(0.06*ACCT).toLocaleString()}</div>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--txt-2);margin-bottom:4px"><span>Phase ${ev.phase||1} target (${ev.profitTargetPct}%)</span><span style="font-family:var(--mono);color:var(--wh)">${c}${Math.max(0,m.pnl).toFixed(0)} / ${c}${profitTarget.toLocaleString()}</span></div>
    <div class="bar-track" style="height:5px;border-radius:3px"><div style="height:100%;width:${profitPct}%;background:${m.pnl>=profitTarget?'var(--g)':'var(--a)'};border-radius:3px;transition:width .4s"></div></div>
    ${m.pnl>=profitTarget&&(ev.phase||1)===1?`<div style="font-size:10px;color:var(--g);margin-top:6px;font-family:var(--mono)">✓ Phase 1 hit — go to Config → mark Phase 2 active</div>`:''}
    ${dailyBreached?`<div style="font-size:10px;color:var(--r);margin-top:6px;font-family:var(--mono)">⚠ Daily loss limit breached</div>`:''}
  </div>`:``}

  <div class="modules">

function buildEquitySvg(closed){
  if(closed.length<2)return`<div style="font-size:11px;color:var(--txt-2);text-align:center;padding:18px 0">No equity data yet</div>`;
  let equity=ACCT;const pts=[ACCT];
  closed.slice().sort((a,b)=>a.id-b.id).forEach(t=>{equity+=t.resultR*R_VAL;pts.push(equity);});
  const min=Math.min(...pts),max=Math.max(...pts),range=max-min||1;
  const W=380,H=68;
  const xs=pts.map((_,i)=>i/(pts.length-1)*W);
  const ys=pts.map(p=>H-(p-min)/range*H*0.8-H*0.1);
  const pathD=xs.map((x,i)=>(i===0?'M':'L')+x.toFixed(1)+','+ys[i].toFixed(1)).join(' ');
  const areaD=pathD+` L${W},${H} L0,${H} Z`;
  const trend=pts[pts.length-1]>=pts[0]?'var(--g)':'var(--r)';
  const fillC=pts[pts.length-1]>=pts[0]?'rgba(0,229,160,.12)':'rgba(255,86,112,.12)';
  return`<svg class="equity-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs><linearGradient id="eg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${fillC}"/><stop offset="100%" stop-color="transparent"/></linearGradient></defs>
    <path d="${areaD}" fill="url(#eg)"/>
    <path d="${pathD}" fill="none" stroke="${trend}" stroke-width="1.5"/>
    <circle cx="${xs[xs.length-1]}" cy="${ys[ys.length-1]}" r="3" fill="${trend}"/>
  </svg>`;
}

let calOffset=0;
function calNav(dir){calOffset=Math.max(0,calOffset-dir);renderContent();}
function buildPnLCalendar(){
  const now=new Date();
  const base=new Date(now.getFullYear(),now.getMonth()-calOffset,1);
  const year=base.getFullYear(),month=base.getMonth();
  const monthName=base.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  const daysInMonth=new Date(year,month+1,0).getDate();
  const firstDay=(new Date(year,month,1).getDay()+6)%7;
  const prefix=String(year)+'-'+String(month+1).padStart(2,'0');
  const dayMap={};
  state.trades.forEach(t=>{
    if(!t.date||!t.tradeTaken||t.resultR==null||!t.date.startsWith(prefix))return;
    dayMap[t.date]=(dayMap[t.date]||0)+Number(t.resultR);
  });
  const todayStr=today();
  const isCurrentMonth=calOffset===0;
  let cells='';
  for(let i=0;i<firstDay;i++)cells+=`<div></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const key=prefix+'-'+String(d).padStart(2,'0');
    const r=dayMap[key];
    const isToday=key===todayStr;
    let cls='cal-d';
    if(r!=null){cls+=(r>0?' win':r<0?' loss':' be');}
    if(isToday)cls+=' today';
    const rStr=r!=null?(r>=0?'+':'')+Number(r).toFixed(1):'';
    cells+=`<div class="${cls}"><span style="font-size:8px;line-height:1">${d}</span>${rStr?`<span class="cal-r" style="font-size:7px;line-height:1">${rStr}</span>`:''}</div>`;
  }
  const monthTotal=Object.values(dayMap).reduce((s,v)=>s+v,0);
  const totalStr=Object.keys(dayMap).length?(monthTotal>=0?'+':'')+monthTotal.toFixed(1)+'R':'—';
  const totalCol=monthTotal>0?'var(--g)':monthTotal<0?'var(--r)':'var(--txt-2)';
  return`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span class="card-title" style="margin:0">P&amp;L Calendar</span>
      <div style="display:flex;align-items:center;gap:6px">
        <button onclick="calNav(-1)" style="background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:3px;color:var(--wh);cursor:pointer;font-size:12px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;padding:0">‹</button>
        <span style="font-family:var(--mono);font-size:8px;color:var(--txt-2);min-width:80px;text-align:center">${monthName}</span>
        <button onclick="calNav(1)" style="background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:3px;color:${isCurrentMonth?'var(--txt-2)':'var(--wh)'};cursor:${isCurrentMonth?'default':'pointer'};font-size:12px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;padding:0" ${isCurrentMonth?'disabled':''}>›</button>
        <span style="font-family:var(--mono);font-size:10px;font-weight:700;color:${totalCol}">${totalStr}</span>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px">${['M','T','W','T','F','S','S'].map(h=>`<div class="cal-h">${h}</div>`).join('')}</div>
    <div class="cal">${cells}</div>
  </div>`;
}

        <div style="font-size:8px;color:var(--txt-2);letter-spacing:.1em;font-family:var(--mono);margin-bottom:5px">TODAY — ${today()}</div>
        ${tr.tradeTaken?`<div style="font-family:var(--mono);font-size:18px;font-weight:700;color:${(tr.resultR||0)>=0?'var(--g)':'var(--r)'};margin-top:4px">${tr.resultR!=null?(tr.resultR>=0?'+':'')+tr.resultR+'R':'Open'}</div><div style="font-size:11px;color:var(--txt-2);margin-top:2px">${tr.pair||'—'} · ${tr.direction||'—'}</div>`:`<div style="margin-top:6px">${badge('NO TRADE','gray')}</div>`}
        ${tr.discScore!=null?`<div style="font-size:9px;color:${tr.discScore>=85?'var(--a)':'var(--amber)'};font-family:var(--mono);margin-top:8px">Discipline: ${tr.discScore}%</div>`:''}
      </div>
      <div style="font-size:10px;color:var(--txt-2);font-family:var(--mono)">Unlocks in ${hoursLeft}h ${minsLeft}m</div>
    </div>`;
  }
  if(s.step===99)return`<div class="card" style="text-align:center;padding:32px 20px"><div style="width:44px;height:44px;border-radius:50%;background:var(--a-soft);border:1px solid var(--a-line);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:20px;color:var(--a)">✓</div><div style="font-size:15px;font-weight:700;color:var(--wh);margin-bottom:8px">Session Complete</div><div class="alert-quote">Prepare. Wait. Confirm. Execute. Manage. Log. Close.</div><button class="btn" style="margin-top:12px" onclick="goMain('log')">View Trade Log →</button></div>`;
  return renderStepBar()+[renderStep0,renderStep1,renderStepBDS,renderStep2,renderStep3,renderStep4,renderStep5,renderStep6][s.step]?.()??'';
}

function renderStep0(){return`<div class="card"><div class="card-title">Daily Commitment</div><div class="alert-quote">"I do not need a trade today. I only need to follow process. If the inducement cycle is incomplete, I wait. If the qualifiers do not pass, I walk away. If I take one trade, the session ends. Waiting is part of my edge."</div><button class="btn btn-amber btn-full" style="margin-top:12px" onclick="setStep(1)">Begin Pre-Session Checklist →</button></div>`;}
function renderStep1(){const done=sessionState.pre.filter(Boolean).length;return`<div class="card"><div class="card-title">Step 1 — Pre-Session<span style="color:var(--txt-2)">${done}/12</span></div><div class="section-sub">All 12 must be complete before entry.</div>${mkChk(PRE_LIST,sessionState.pre,'togglePre')}<div class="btn-row"><div class="nav-right"><button class="btn" onclick="logNoTrade('Pre-session checklist incomplete')">No Trade</button><button class="btn btn-amber" ${done<12?'disabled':''} onclick="setStep(2)">Continue →</button></div></div></div>`;}
function renderStepBDS(){
  const bds=sessionState.bds;const score=bds.filter(Boolean).length*2;
  const BDS_LIST=['Am I checking charts outside my session window?','Am I thinking this almost qualifies?','Do I feel urgency to enter?','Am I staying past session close?','Am I frustrated after a loss or missed move?'];
  const danger=score>=6;
  return`<div class="card"><div class="card-title">Step 2 — Boredom Detection<span style="color:var(--txt-2)">${score}/10</span></div>${BDS_LIST.map((item,i)=>`<div class="chk-row ${bds[i]?'on':''}" onclick="toggleBDS(${i})"><div class="chk-box ${bds[i]?'on':''}"></div><span class="chk-lbl">${item}</span></div>`).join('')}<div class="alert ${score===0?'alert-g':score<6?'alert-a':'alert-r'}" style="margin-top:10px;font-family:var(--mono);font-size:11px">${score}/10 — ${score===0?'Safe to continue':score<6?'Caution — proceed carefully':'High boredom risk — no trade'}</div><div class="btn-row"><button class="btn" onclick="setStep(1)">← Back</button><div class="nav-right"><button class="btn" onclick="logNoTrade('BDS too high')">No Trade</button><button class="btn btn-amber" ${danger?'disabled':''} onclick="setStep(3)">Continue →</button></div></div></div>`;}
function renderStep2(){

function renderStep3(){const allDel=sessionState.del.every(Boolean);return`<div class="card"><div class="card-title">Step 4 — Delivery Phase</div><div class="section-sub">A clean setup in the wrong phase = no trade.</div>${mkChk(DEL,sessionState.del,'toggleDel')}<div class="btn-row"><button class="btn" onclick="setStep(3)">← Back</button><div class="nav-right"><button class="btn" onclick="logNoTrade('Delivery phase unclear')">No Trade</button><button class="btn btn-amber" ${allDel?'':'disabled'} onclick="setStep(5)">Enter Trade →</button></div></div></div>`;}

  <div class="grid2" style="margin-bottom:12px">
    <div><span class="flbl">Pair</span><input type="text" value="${tr.pair}" placeholder="GBPUSD" oninput="updTrade('pair',this.value)"></div>

  ${tr.outcome&&tr.outcome!=='open'?`<div style="margin-bottom:12px"><span class="flbl">Classification</span><select onchange="updTrade('classification',this.value)"><option value="">Select...</option>${['Valid Win','Valid Loss','Execution Error','Rule Violation','Psychology Trade','Market Condition Error'].map(o=>`<option ${tr.classification===o?'selected':''}>${o}</option>`).join('')}</select></div>`:''}

function commitSession(){
  const s=sessionState;const tr=s.trade;const ds=discScore();
  const bdsScore=s.bds?s.bds.filter(Boolean).length*2:null;
  const entry={id:Date.now(),date:tr.date||today(),tradeTaken:true,pair:tr.pair,session:tr.session,setupType:tr.setupType,inducement:tr.inducement,deliveryPhase:tr.deliveryPhase,direction:tr.direction,entry:tr.entry,sl:tr.sl,tp:tr.tp,outcome:tr.outcome,resultR:tr.outcome!=='open'?(parseFloat(tr.resultR)||null):null,classification:tr.classification,notes:tr.notes,discScore:ds,bdsScore};
  state.trades.push(entry);save();setStep(99);
}

  </div>

function renderRoR(){
  const s=state.settings;const m=metrics();const c=cur();
  const tpR=s.tpR||3;const riskPct=s.riskPct||0.5;
  const scenarios=[{label:'35%',wr:35},{label:'40%',wr:40},{label:'45%',wr:45},{label:'50%',wr:50}];
  const ev=(wr,tp)=>(wr/100*tp-(1-wr/100)*1).toFixed(2);
  return`<div class="card glow" style="margin-bottom:10px">
    <div class="card-title">Risk of Ruin · ${riskPct}% / ${tpR}R</div>
    <div style="font-size:10px;color:var(--txt-2);margin-bottom:10px">Expected value at different win rates. Daily −1R / weekly −3R stops reduce real ruin significantly below theoretical.</div>
    ${scenarios.map(sc=>{
      const wr=sc.wr,tp=tpR,p=wr/100;
      const evR=(p*tp-(1-p)*1).toFixed(2);
      const evCol=parseFloat(evR)>0?'var(--g)':'var(--r)';
      return`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)">
        <span style="font-family:var(--mono);font-size:10px;color:var(--txt);min-width:40px">${sc.label} WR</span>
        <div style="flex:1"><div class="bar-track" style="height:3px"><div style="height:100%;width:${sc.wr}%;background:${evCol};border-radius:2px"></div></div></div>
        <span style="font-family:var(--mono);font-size:11px;font-weight:700;color:${evCol}">EV: ${evR}R</span>
      </div>`;
    }).join('')}
  </div>`;
}
function renderScaling(){
  const c=cur();const m=metrics();const fp=state.fundProgress||{};const ftg=ft();
  const ftTotal=(fp.salaryBuffer||0)+(fp.challengeFund||0)+(fp.personalAccount||0);

  const revenge=state.trades.filter(t=>t.classification==='Psychology Trade').length;
  const viols=state.trades.filter(t=>t.classification==='Rule Violation').length;
  const closed=state.trades.filter(t=>t.tradeTaken&&t.resultR!=null&&t.outcome!=='open');
  const valid=closed.filter(t=>t.classification==='Valid Loss'||t.classification==='Valid Win').length;
  const vRatio=closed.length?valid/closed.length*100:0;
  const scaleItems=[{l:'30–40 logged trades',pass:closed.length>=30,v:`${closed.length}/30`},{l:'Discipline avg 85%+',pass:m.discAvg>=85,v:`${m.discAvg}%`},{l:'Win rate 35%+',pass:m.winRate>=35,v:`${m.winRate}%`},{l:'Zero psychology trades',pass:revenge===0,v:`${revenge}`},{l:'Min rule violations',pass:viols<=1,v:`${viols}`},{l:'Valid loss ratio 80%+',pass:vRatio>=80,v:`${vRatio.toFixed(0)}%`}];
  const allPass=scaleItems.filter(i=>i.pass!==null).every(i=>i.pass);
  const sc=state.scalingChecks||Array(10).fill(false);
  const fc=state.ftChecks||Array(10).fill(false);
  const SC_ITEMS=['30–40 logged trades completed','Discipline average 85% or higher','Win rate 40–45% preferred','Zero revenge trades','Zero pending order mistakes','No repeated rule violations','Most losses are valid losses','Emotional pressure is low','Current account is stable','Scaling money already allocated'];
  const FT_ITEMS=[`${c}${(ftg.salaryBuffer+ftg.challengeFund+ftg.personalAccount).toLocaleString()} total fund completed`,`${c}${ftg.salaryBuffer.toLocaleString()} salary buffer saved`,'At least 2 funded accounts operational','3 months of stable results','85%+ discipline over 3 months','45%+ win rate over 3 months','Zero Almost A+ trades (final 4 weeks)','Zero revenge trades','Personal account funded or ready','No desperation to leave job'];
  return`
  <div style="margin-bottom:12px"><div class="pg-title">Scaling</div><div class="section-sub">Evidence-based permission system</div></div>

    <div class="alert ${allPass?'alert-g':'alert-r'}" style="margin-top:10px">SCALING: ${allPass?'✓ ALLOWED':'✗ NOT ALLOWED'}</div>

    ${bar(ftTotal,ftMax,ftTotal>=ftMax?'g':'')}
    <div class="grid3" style="margin-top:10px">
      ${[['Salary',fp.salaryBuffer||0,ftg.salaryBuffer,'salaryBuffer'],['Challenge',fp.challengeFund||0,ftg.challengeFund,'challengeFund'],['Personal',fp.personalAccount||0,ftg.personalAccount,'personalAccount']].map(([l,v,max,k])=>`<div><div style="font-size:9px;color:var(--txt-2);margin-bottom:3px">${l}</div>${bar(v,max,v>=max?'g':'')}<div style="font-size:9px;color:var(--txt-2);margin-top:2px">${c}${v.toLocaleString()}</div><input type="number" placeholder="Update" style="margin-top:5px;padding:5px 7px;font-size:10px" oninput="updateFund('${k}',this.value)"></div>`).join('')}

  </div>`;
}
function updateFund(k,v){state.fundProgress[k]=parseFloat(v)||0;save();renderContent();}
function toggleScaling(i){if(!state.scalingChecks)state.scalingChecks=Array(10).fill(false);state.scalingChecks[i]=!state.scalingChecks[i];save();renderContent();}
function toggleFT(i){if(!state.ftChecks)state.ftChecks=Array(10).fill(false);state.ftChecks[i]=!state.ftChecks[i];save();renderContent();}

  const wt=state.trades.filter(t=>new Date(t.date)>=weekStart()&&t.tradeTaken&&t.resultR!=null&&t.outcome!=='open');
  const wR=weeklyR();
  const wins=wt.filter(t=>t.resultR>0).length;
  const losses=wt.filter(t=>t.resultR<0).length;
  const be=wt.filter(t=>t.resultR===0).length;
  const wr=wt.length?+(wins/wt.length*100).toFixed(1):0;
  const scored=wt.filter(t=>t.discScore!=null);
  const discAvg=scored.length?+(scored.reduce((s,t)=>s+t.discScore,0)/scored.length).toFixed(1):0;
  const pnl=Math.round(wR*(state.settings?.riskPct||0.5)/100*(state.settings?.accountSize||25000));
  return{weekKey:REVIEW_WEEK_KEY(),wins,losses,be,winRate:wr,discAvg,weekPnl:pnl,weekR:+wR.toFixed(2),
    anyQualFail:'',anyPendingOrder:'',anyRevenge:'',anyPhaseConflict:'',
    zeroTradeSessions:'',idmFired:'',markupDone:false,pdlMarked:false,idmSet:false,bdsOk:false,alarmsSet:false,

}

<script>
// ── PWA: INLINE SERVICE WORKER (no server needed) ──
if('serviceWorker' in navigator){
  const swCode=`
const CACHE='pgfx-v2';
self.addEventListener('install',e=>{self.skipWaiting();});
self.addEventListener('activate',e=>{
  e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))).then(()=>self.clients.claim()));
});
self.addEventListener('fetch',e=>{
  e.respondWith(caches.match(e.request).then(cached=>cached||fetch(e.request).then(r=>{
    if(r&&r.status===200&&r.type==='basic'){const c=r.clone();caches.open(CACHE).then(cache=>cache.put(e.request,c));}
    return r;
  })));
});`;
  try{
    const blob=new Blob([swCode],{type:'application/javascript'});
    const url=URL.createObjectURL(blob);
    navigator.serviceWorker.register(url,{scope:'./'})
      .then(()=>{ URL.revokeObjectURL(url); console.log('PgFX: offline ready'); })
      .catch(()=>{ URL.revokeObjectURL(url); });
  }catch(e){}
}
</script>
